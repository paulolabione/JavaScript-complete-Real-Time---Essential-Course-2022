    <script>
        document.write('Hello World!!!');

        // document.write('<h3>Original Value of a = <big style= "color: blue">' + a +'</big></h3>');
        document.write(`<h3>Original Value of a = <big style= "color: blue">${a}</h3>`);
        console.lo(`<h3>Original Value of a = <big style= "color: blue">${a}</h3>`);
    </script>
