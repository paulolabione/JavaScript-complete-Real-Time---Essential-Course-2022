<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Placements</title>
    <!-- External JavaScript -->
    <script src="JS/js-ext.js" type="text/JavaScript"  language="JavaScript"></script>
    <!-- Internal JavaScript -->
    <script>
        document.write("<h3>This is Some Default <b style= 'color: red;'>INTERNAL JS</b> Content called</h3>");
    </script>
</head>
<body>
    <!-- Inline JavaScript-->
     <script>

        document.write("<h3>This is Some Default <b style= 'color: red;'>INLINE JS</b> Content called</h3>");

        for (i = 0; i < 4; i++) {
            document.write('This is printed four times' + '<br>');
    }

     </script>


    <h3>This is Some Default HTML Content Kept in Body Tag</h3>
    
</body>
</html>
